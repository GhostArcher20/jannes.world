<!DOCTYPE html>

    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <style>
        body {
            background-image: url('landingpage_background.jpg');
        }
        .image-stack {
		    position: relative;  /* This becomes the anchor for absolute positioning */
		    display: inline-block;  /* Container only as wide as its contents */
		    margin: 0 auto;  /* Center the stack */
		}
        .gate-image {
            max-width: 500px;
            width: 100%;
            height: auto;
            /* border: 3px solid gold; */
            /* border-radius: 10px; */
            display: block;           /* Needed for margin auto to work */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;  							/* Keeps it in normal flow but allows z-index */
    		z-index: 1;  									/* Lower number = behind */
        }
        .guard-image {
            max-width: 150px;
            width: 100%;
            height: auto;
            display: block;           						/* Needed for margin auto to work */
            position: absolute;  							/* Takes it out of normal flow */
	        right: -20px;    								/* More negative = more to the right */
    		bottom: -30px;   								/* More negative = lower down */
		    z-index: 2;  /* Higher number = in front */
		    filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5)); /* slight shadow to make it pop */
        }
        /* Optional: Add a hover effect */
		.guard-image:hover {
		    transform: scale(1.05);
		    transition: transform 0.3s;
		    cursor: pointer;
		}
          
	</style>
	</head>
