<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blacksmith</title>
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
        
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body
    data-arrows='{
      "arrow-upleft-link":     {"href": "#",                 "tooltip": "Nothing there..."},
      "arrow-downleft-link":   {"href": "#",                 "tooltip": "Nothing there..."},
      "arrow-up-link":         {"href": "#",                 "tooltip": "Nothing there..."},
      "arrow-upright-link":    {"href": "#",                 "tooltip": "Nothing there..."},
      "arrow-right-link":      {"href": "castle_gate.html",  "tooltip": "Go towards the castle"},
      "arrow-downright-link":  {"href": "index.html",        "tooltip": "Back to start"},
      "arrow-down-link":       {"href": "market.html",       "tooltip": "Visit the market"},
      "arrow-left-link":       {"href": "smeltery.html",     "tooltip": "Go to the smelter"}
    }'>
    
    <div class="container">
        <div id="left-sidebar" class="left-sidebar"></div>
        
        <div class="main-content">
            
            <div id="smithyModal" class="modal-overlay hidden">
                <div class="smithy-window">
                    <h3>The Anvil</h3>
                    <p id="smithyDialogue" style="font-style: italic; color: #acc9a7;">
                        "Which ingots shall I use for this piece?"
                    </p>
                    
                    <div style="margin: 10px 0;">
                        <span style="font-size: 12px;">Required: </span>
                        <span id="smithyRequirement" style="font-weight: bold; color: gold;">0/3 Iron Ingots</span>
                    </div>
            
                    <div id="smithyIngotGrid" class="smithy-grid"></div>
            
                    <div style="margin-top: 15px; display: flex; justify-content: space-between;">
                        <button id="cancelSmithBtn" class="ui-button danger" onclick="closeSmithyUI()">Walk Away</button>
                        <button id="confirmCraftBtn" class="ui-button success" onclick="executeCrafting()" disabled>Forge Item</button>
                    </div>
                </div>
            </div>
            
            <div>
                <h2>The Blacksmith</h2>
                <p>Welcome to the forge. If you have the materials, I can hammer them into something useful.</p>
                
                <div id="blacksmithMenu" style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin-top: 20px;"></div>
            </div>
            
        </div>
        
        <div id="right-sidebar" class="right-sidebar"></div>
    </div>

    <script src="database.js"></script>
    <script src="stats.js"></script>  
    <script src="expPoints.js"></script>
    <script src="load-sidebars.js"></script>
    <script src="crafting.js"></script>

    </body>
</html>
