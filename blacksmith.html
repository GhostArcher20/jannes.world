<!DOCTYPE html>
<html>
    <head>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- for responsive pages for mobile and pc-->
		<title>Blacksmith</title>
		<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
		<!-- Link to the shared CSS file -->
		<link rel="stylesheet" href="style.css">
        <style>
        	/* ======== Modal Overlay ======== */
			.modal-overlay {
			    position: fixed;
			    top: 0; left: 0; right: 0; bottom: 0;
			    background: rgba(0, 0, 0, 0.8);
			    display: flex;
			    justify-content: center;
			    align-items: center;
			    z-index: 1000;
			}
			.modal-overlay.hidden {
			    display: none;
			}
			
			/* ======== Smithy Window ======== */
			.smithy-window {
			    background-image: var(--motherload);
			    border: 3px solid var(--light-gray);
			    border-radius: 8px;
			    padding: 20px;
			    width: 300px;
			    box-shadow: 5px 5px 15px black;
			    color: white;
			    text-align: center;
			}
			
			.smithy-grid {
			    display: flex;
			    flex-wrap: wrap;
			    gap: 8px;
			    justify-content: center;
			    min-height: 50px;
			    background: var(--dark-gray);
			    padding: 10px;
			    border: 2px inset var(--gray);
			}
			
			/* ======== Selectable Ingots ======== */
			.selectable-ingot {
			    width: 32px;
			    height: 32px;
			    border: 2px solid var(--gray);
			    background: var(--darkish-gray);
			    cursor: pointer;
			    display: flex;
			    align-items: center;
			    justify-content: center;
			    font-size: 10px;
			    font-weight: bold;
			    transition: 0.2s;
			    position: relative;
			}
			.selectable-ingot:hover {
			    border-color: var(--light-green);
			}
			.selectable-ingot.selected {
			    border-color: gold;
			    background: var(--dark-brown);
			    transform: scale(1.1);
			    box-shadow: 0 0 8px gold;
			}
			
			/* Basic UI Buttons */
			.ui-button {
			    padding: 5px 15px;
			    font-family: inherit;
			    font-weight: bold;
			    cursor: pointer;
			    border-radius: 4px;
			    border: 1px solid black;
			}
			.ui-button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
			.ui-button.danger { background: #8b0000; color: white; }
			.ui-button.success { background: var(--green); color: black; }
        </style>
    </head>
    <body
data-arrows='{
	  "arrow-upleft-link":     {"href": "#", 				 "tooltip": "Nothing there..."},
	  "arrow-downleft-link":   {"href": "#",       			 "tooltip": "Nothing there..."},
	  "arrow-up-link":         {"href": "#", 				 "tooltip": "Nothing there..."},
	  "arrow-upright-link":    {"href": "#",  				 "tooltip": "Nothing there..."},
	  "arrow-right-link":      {"href": "castle_gate.html",	 "tooltip": "Go towards the castle"},
	  "arrow-downright-link":  {"href": "index.html",        "tooltip": "Back to start"},
	  "arrow-down-link":       {"href": "market.html",       "tooltip": "Visit the market"},
	  "arrow-left-link":       {"href": "smeltery.html",     "tooltip": "Go to the smelter"}
	}'>
	<div class="container">
	    <!-- Empty div that will be filled by JavaScript -->
	    <div id="left-sidebar" class="left-sidebar"></div>
	    
	    <div class="main-content">
            <div id="smithyModal" class="modal-overlay hidden">
			    <div class="smithy-window">
			        <h3>The Anvil</h3>
			        <p id="smithyDialogue" style="font-style: italic; color: #acc9a7;">
			            "Which ingots shall I use for this piece?"
			        </p>
			        
			        <div style="margin: 10px 0;">
			            <span style="font-size: 12px;">Required: </span>
			            <span id="smithyRequirement" style="font-weight: bold; color: gold;">0/3 Iron Ingots</span>
			        </div>
			
			        <div id="smithyIngotGrid" class="smithy-grid"></div>
			
			        <div style="margin-top: 15px; display: flex; justify-content: space-between;">
			            <button id="cancelSmithBtn" class="ui-button danger" onclick="closeSmithyUI()">Walk Away</button>
			            <button id="confirmCraftBtn" class="ui-button success" onclick="executeCrafting()" disabled>Forge Item</button>
			        </div>
			    </div>
			</div>
			
            <div>
                <h2>The Blacksmith</h2>
                <p>Welcome to the forge. If you have the materials, I can hammer them into something useful.</p>
                
                <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin-top: 20px;">
                    <button class="ui-button" onclick="openSmithyUI('iron_sword')">
                        Forge Iron Sword
                    </button>
                    
                    <button class="ui-button" onclick="openSmithyUI('ring_of_smithing_forgiveness')">
                        Forge Ring of Forgiveness
                    </button>
                    
                    <button class="ui-button" onclick="openSmithyUI('copper_helmet')">
                        Forge Copper Helmet
                    </button>
                </div>
            </div>
		</div>
		<!-- Empty div that will be filled by JavaScript -->
	    <div id="right-sidebar" class="right-sidebar"></div>
  </div>

<script src="stats.js"></script>  
<script src="expPoints.js"></script>
<script src="load-sidebars.js"></script>
<script src="crafting.js"></script>

    </body>
</html>
