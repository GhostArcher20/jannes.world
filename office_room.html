<!DOCTYPE html>
<html>
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Office</title>
	    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
	    <style>
	    	.desk {
			    position: relative;
			    width: 800px;
			    margin: 50px auto;
			    background: #8b5a2b; /* wood effect */
			    padding: 40px;
			    border-radius: 10px;
			    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
			}
			
			.pc {
			    width: 600px;
			    margin: 0 auto;
			    background: #c0c0c0;
			    border: 5px solid #808080;
			    border-radius: 10px 10px 0 0;
			    padding: 20px;
			}
			
			.screen {
			    background: #000;
			    padding: 20px;
			    border-radius: 5px;
			}
			
			.pc-screen {
			    width: 100%;
			    height: 300px;
			    border: none;
			    background: #fff;
			}
			
			.pc-body {
			    background: #c0c0c0;
			    text-align: center;
			    padding: 10px;
			    font-weight: bold;
			    border-top: 2px solid #fff;
			}
			
			.mouse {
			    position: absolute;
			    bottom: 20px;
			    right: 100px;
			    width: 80px;
			    cursor: pointer;
			    transition: transform 0.1s;
			}
			
			.mouse:hover {
			    transform: scale(1.05);
			}
			
			.go_into_old_pc_btn {
			    display: inline-block;
			    margin-top: 30px;
			    padding: 10px 20px;
			    background: #ffcc00;
			    color: #000;
			    text-decoration: none;
			    border: 3px solid #808080;
			    font-weight: bold;
			}
			
			.go_into_old_pc_btn:hover {
			    background: #ffaa00;
			}
			
			
		</style>
	</head>
	<body
	data-arrows='{
	  "arrow-downleft-link":   {"href": "#",       "tooltip": "Nothing there..."},
	  "arrow-upleft-link":     {"href": "#", 				 "tooltip": "Nothing there..."},
	  "arrow-up-link":         {"href": "#","tooltip": "Nothing there..."},
	  "arrow-upright-link":    {"href": "#","tooltip": "Nothing there..."},
	  "arrow-right-link":      {"href": "#",     			 "tooltip": "Nothing there..."},
	  "arrow-downright-link":  {"href": "#",     "tooltip": "Nothing there..."},
	  "arrow-down-link":       {"href": "castle_hallway.html",        "tooltip": "Back to hallway"},
	  "arrow-left-link":       {"href": "#",                 "tooltip": "Nothing there..."}
	}'>
		<div class="container">
			<!-- Sidebar CONTAINER -->
			<div id="left-sidebar" class="left-sidebar"></div>
			
			<div class="main-content">
				<div class="desk">
			        <!-- The old boxy PC -->
			        <div class="pc">
			            <div class="screen">
							<img class="pc-screen" src="landingpage_background.jpg" alt="PC screen">
			            </div>
			            <div class="pc-body">PC</div>
			        </div>
			        <!-- The clickable mouse -->
			        <img src="assets/pixel-art-computer-mouse.png" class="mouse" alt="mouse">
			        <!-- Expand button -->
					<a href="#" onclick="goToRandomOldPcPage(); return false;" class="go_into_old_pc_btn">immerse yourself in this pc</a>
					<script>
					function goToRandomOldPcPage() {
					    const pages = [
					        'old_pc_pages/blog_lapland_2024.html',
					        'old_pc_pages/blog_tirana_2023.html', 
					        'old_pc_pages/blog_croatia_2018.html',
					        'old_pc_pages/review_wiels_exhibitions.html#feb26',
					        'old_pc_pages/review_wiels_exhibitions.html#mar26'
					    ];
					    
					    const randomIndex = Math.floor(Math.random() * pages.length);
					    window.location.href = pages[randomIndex];
					}
					</script>
			    </div>
				
			</div>  
			
			<!-- Sidebar CONTAINER (stays in main page) -->
			<div id="right-sidebar" class="right-sidebar"></div>
		</div>
	
	<script>
		// Script to cycle through images when clicking the mouse
		document.addEventListener('DOMContentLoaded', function() {
		    const mouse = document.querySelector('.mouse');				// Get the mouse element and PC screen image
		    const pcScreen = document.querySelector('.pc-screen');
		    // Array of image paths to cycle through
		    const images = [
		        'landingpage_background.jpg',	// starting image
		        'minimap.png',
		        'mossy-stone-gate.jpg',
		        'assets/screen4.jpg'
		        // Add more images here
		    ];
		    let currentImageIndex = 0;  		// Start with first image
		    // Make sure we found both elements
		    if (mouse && pcScreen) {
		        mouse.addEventListener('click', function(event) {						// click event listener to the mouse
		            event.preventDefault();												// Prevent any default behavior
		            currentImageIndex = (currentImageIndex + 1) % images.length;		// Cycle to next image (loop back to start if at end)
		            pcScreen.src = images[currentImageIndex];		// Update the screen image
		            this.style.transform = 'scale(0.95)';			// little click animation to the mouse
		            setTimeout(() => {
		                this.style.transform = 'scale(1)';
		            }, 100);
		        });
		        // hover effect to show mouse is clickable
		        mouse.addEventListener('mouseenter', function() {
		            this.style.cursor = 'pointer';
		        });
		    }
		});
	</script>
		
	<script src="stats.js"></script>
	<script src="expPoints.js"></script>
 	<script src="load-sidebars.js"></script>
		
	</body>
</html>
