<head>
    <meta charset="UTF-8">
    <title>Misc museums</title>
    
    <!-- Add this line to include Marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<link rel="stylesheet" href="windows_xp_style.css">
    <style>
    	body {
    		background: #fff6a8;
    	}
    	p {
    		text-align: justify;
    		font-family: Segoe UI;
    	}
    	h1 {
    		/* font from the Wiels page of the exhibition */
    		font-family: korolev, Helvetica Neue, Helvetica, Arial, sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Noto Sans, Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol, Noto Color Emoji;
    		font-size: 72px;
    	}
    	.content {
		    background: #c2c2c2;
		    text-align: justify
		}
		.sidebar {
			background: #c2c2c2;
			position: sticky;
		}
		.links {
		}
        /* .regular-links {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        } */
        
        .links a {
            color: #4a4a4a;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            padding: 0 10px 0 0;
            font-size: 18px;
            text-align: right;
            border: 1px solid transparent;
            transition: all 0.5s;
        }
        
        .links a:hover {
        	color: black;
            border-color: white;
            border-radius: 5px;
            padding-right: 20px;
        }
        .quotebox-right {
        	position: relative;
        	float: right;
        	width: 33%;
        	border: 2px solid black;
        	padding: 50px;
        	margin: 1em 0 0 1.5em;
        	text-align: left;
        	text-justify: interword;
        }
        .quotebox-left {
        	position: relative;
        	float: left;
        	width: 33%;
        	border: 2px solid black;
        	padding: 50px;
        	margin: 1em 1.5em 0 0;
        	text-align: left;
        	text-justify: interword;	
        }
		.quotebox-left::before, .quotebox-right::before {
			content: "";
			position: absolute;
			top: -30px;
			left: -30px;
			width: 70px;
			height: 70px;
			background-size: contain;
			background-repeat: no-repeat;
			background-image: url(https://jannesworld.nekoweb.org/assets/doublequote.png);
		}
        /* img inline */
        .img-inline img {
		    max-width: 100%;
		    height: auto;
		    display: block;
		    margin: 30px 0;          /* space above and below */
		}
		.image-center {
			display: block;
			margin: 0 auto;
			width: 50%;
		}
		/* img next to text */
		.image-float-left img{
			float: left;
			margin-right: 20px;
		}
		.image-row {
		    display: flex;
		    gap: 20px;
		    margin: 30px 0;
		    align-items: center;      /* or flex-start */
		}
		.image-row img {
		    flex: 1;                  /* image takes half the space */
		    max-width: 50%;
		}
		.image-row .text {
		    flex: 1;                  /* text takes the other half */
		}
		.image-row.reverse {
		    flex-direction: row-reverse;
		}
		.image-row.img-small img {
		    max-width: 30%;
		    flex: 0 0 30%;
		}
		.popup-image {				/* broken */
			display: none;          /* hidden by default */
		}
		.image-swap:hover .popup-image  { /* "+" Selects the first <p> element that is placed immediately after <div> elements*/
			display: block;
		}
		/* img behind text */
		.image-behind-text {
		    position: relative;
		    margin: 40px 0;
		}
		.image-behind-text .bg-image {
		    width: 100%;
		    height: auto;
		    display: block;
		}
		.text-overlay {
		    position: absolute;
		    top: 50%;
		    left: 50%;
		    transform: translate(-50%, -50%);
		    background: rgba(255, 255, 255, 0.8); /* semi‑transparent background */
		    padding: 20px;
		    border-radius: 8px;
		    max-width: 80%;
		    text-align: center;
		}
		/* use an image that stretches the full width */
		.full-width {
		    width: 70vw;
		    position: relative;
		    left: 50%;
		    right: 50%;
		    margin-left: -50vw;
		    margin-right: -50vw;
		}
		.full-width img {
		    width: 100%;
		    height: auto;
		    display: block;
		}


    </style>
</head>
