<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="windows_xp_style.css">
    <style>
	    body {
			font-family: arial, sans-serif;
			background-color: DarkSlateGray;
			background-image: linear-gradient(70deg, DarkSlateGray 20%, #0f4511 40%, #1b2b36 60%, #0f4511 100%);
		}
		.content {
			background: #ceded5;
		    border-radius: 20px;
		}
		.sidebar {
			background: #ceded5;
		    border-radius: 20px;
		}
		.spinningdvd-gif {

			left: 300px;

		.moviecamera-gif {
			position: absolute;
			top: 300px;
			left: 800px;
		}
		
	</style>
</head>
    
<body>
  	
	
	<div class="content-wrapper">
		<div class="sidebar" data-section="socials"></div>
		<div class="content">
			<h1>My Letterboxd</h1>
			<div class="link">
					<a href="https://letterboxd.com/jannes27/">my Letterboxd page</a>
		    </div>
		    <h1>My Last.fm</h1>
			<div class="link">
					<a href="https://www.last.fm/user/jannes27">My Last.fm page</a>
		    </div>
		</div>
	</div>
	
	<!-- fun gifs -->
	<img src="../assets/spinningdvd.gif" class="spinningdvd-gif">
	<img src="../assets/oldmoviecamera.gif" class="moviecamera-gif">
	
	
	  
	<!-- taskbar -->
	<div class="xp-taskbar">
	    <div class="taskbar-start">
	        <img src="../assets/taskbar_start.png" alt="Start">
	    </div>
	    <div class="taskbar-background"></div>
	    <div class="taskbar-right-menu">
	        <img src="../assets/taskbar_right_menu.png" alt="System Tray">
	    </div>
	</div>
	<!-- top right minimize menu -->

	<script src="load-sidebar.js"></script>

</html>
