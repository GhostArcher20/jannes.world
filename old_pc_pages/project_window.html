<!doctype html>
<html lang="en">
	<head>
	    <meta charset="UTF-8" />
	    <title>title</title>
	    <link rel="stylesheet" href="windows_xp_style.css" />
	    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/xt256.min.css"/>
	    <style>
	        /* Hide scrollbars but keep scrolling */
	        html, body {
	            margin: 0;
	            padding: 0;
	            width: 100%;
	            height: 100%;
	            overflow: auto;                 /* allow scrolling */
	            scrollbar-width: none;           /* Firefox */
	            -ms-overflow-style: none;        /* IE/Edge */
	        }
	        body::-webkit-scrollbar {
	            display: none;                   /* Chrome/Safari */
	        }
	
	        body {
	            background-color: #000;          /* fallback, but your HTML content covers it */
	        }
	
	        #code-display {
	            position: absolute;
	            min-width: 1000px;
	            margin: 0px 0px;
	            border-radius: 0px;
	            overflow: visible;
	        }
	        pre {
	            margin: 0 !important;
	            border-radius: 0px;
	        }
	        pre code {
	            font-size: 16px;
	        }
	
	        /* Canvas overlay – fills the viewport exactly */
	        #overlay {
	            position: fixed;
	            top: 0;
	            left: 0;
	            width: 100vw;                    /* use viewport units */
	            height: 100vh;
	            display: block;
	            border: none;
	            outline: none;
	            z-index: 2;
	            pointer-events: none;
	        }
	
	        #cursor-border {
	            position: fixed;
	            width: 50px;	/* remember to edit the box size itself when editing this */
	            height: 50px;
	            border: 1px solid transparent;
	            box-shadow: 0px 0px 20px 7px black;
	            pointer-events: none;
	            z-index: 3;
	        }
	    </style>
	</head>
	<body>
	    
	
	    <canvas id="overlay"></canvas>
	    <div id="cursor-border"></div>
	
	    <!-- code window -->
	    <div id="code-display">
	        <pre><code class="language-html" id="code-element"></code></pre>
	    </div>
	
	    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
	
	    <script>
	        // Fetch and display the code (your existing logic)
	        fetch('project_window.html')
	            .then(response => response.text())
	            .then(code => {
	                const codeElement = document.getElementById('code-element');
	                codeElement.textContent = code;
	                hljs.highlightElement(codeElement);
	            });
	    </script>
	
	    <script>
	        // Cursor hole effect
	        const canvas = document.getElementById('overlay');
	        const ctx = canvas.getContext('2d');
	        const border = document.getElementById('cursor-border');
	        const size = 50; // square size (remember to also change the border if editing this)
	    	const size2 = 200; // enlarged square size
	    	const size3 = 300; //cutout square size
	
	        let mouseX = -1000, mouseY = -1000; // start off-screen
	        let permCutouts = [];                 // stores {x, y} of each double‑click
	
	        function draw() {
	            // Get the exact pixel dimensions of the canvas as it is rendered on screen
	            const rect = canvas.getBoundingClientRect();
	            // Set the canvas backing store to match those dimensions (prevents blurriness)
	            canvas.width = rect.width;
	            canvas.height = rect.height;
	
	            // Fill with blue
	            ctx.fillStyle = 'grey';
	            ctx.fillRect(0, 0, canvas.width, canvas.height);
	
	            // Cut out the square centered on the mouse (mouse coords are viewport‑relative)
	            ctx.clearRect(mouseX - size/2, mouseY - size/2, size, size);
	            
	            // all permanent Cutouts
	            permCutouts.forEach(pos => {
           		ctx.clearRect(pos.x - size3/2, pos.y - size3/2, size3, size3);
        		});
	        }
	        
	        function enlarge () {
	        	// enlarge the square centered on the mouse (mouse coords are viewport‑relative)
	            ctx.clearRect(mouseX - size2/2, mouseY - size2/2, size2, size2);
	        }
	        function cut() {
	        	//store the values
	        	permCutouts.push({ x: mouseX, y: mouseY });
	        	// Cut out the square centered on the mouse (mouse coords are viewport‑relative)
	        	draw ();
	        }
	
	        function updateBorder() {
	            border.style.left = (mouseX - size/2) + 'px';
	            border.style.top = (mouseY - size/2) + 'px';
	        }
	
	        // Initial draw (hole off-screen)
	        draw();
	        updateBorder();
	
	        // On resize, recalculate and redraw
	        window.addEventListener('resize', () => {
	            draw();
	            updateBorder();
	        });
	
	        // On mouse move, update position and redraw
	        document.addEventListener('mousemove', (e) => {
	            mouseX = e.clientX;
	            mouseY = e.clientY;
	            draw();
	            updateBorder();
	        });
	        
	        // On mouse click, update position and redraw
	        document.addEventListener('click', (e) => {
	            mouseX = e.clientX;
	            mouseY = e.clientY;
	            enlarge();
	        });
	        // On mouse click, update position and redraw
	        document.addEventListener('dbclick', (e) => {
	            mouseX = e.clientX;
	            mouseY = e.clientY;
	            cut();
	        });
	    </script>
	    
	    
	    <script>



    function updateBorder() {
        border.style.left = (mouseX - size/2) + 'px';
        border.style.top = (mouseY - size/2) + 'px';
    }

    // Initial draw (hole off‑screen)
    draw();
    updateBorder();

    document.addEventListener('dblclick', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cut();
    });
</script>
	    <script src="load-windows-xp-hud.js"></script>
	</body>
</html>
