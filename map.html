    <style type="text/css" media="all">
      body {
        background-color: rgba(82, 52, 4, 1);
      }
      .main-content {
        justify-content: center;
        align-content: center;
      }
      .navigation-box {
        visibility: hidden;
      }
      .minimap-container {
      	visibility: hidden;
      }
      
      /* ======== MAP CSS ======== */
      .map-viewport {
          width: 100%;
          height: auto;
          overflow: auto;           
      }

      /* The actual map background */
      .map-container {
          width: 800px; /* Forces map to be large enough for clicking */
          height: 750px;
          position: relative;
          background-image: url('assets/map.png');
          background-size: cover;
          background-position: center;
      }

      /* The Clickable Pins Base */
      .map-pin {
          position: absolute;
          width: 40px;
          height: 40px;
          border-radius: 50%;
          cursor: pointer;
          transform: translate(-50%, -50%); 
          transition: 0.2s;
          z-index: 5;
      }

      /* Pin States! */
      /* .pin-unvisited {
      }*/
      .pin-visited {
          backdrop-filter: contrast(150%);
          backdrop-filter: brightness(150%);
      }
      .pin-current {
          backdrop-filter: contrast(150%);
          backdrop-filter: brightness(200%);
      }
      .pin-current::before {
      	content: "";
      	position: absolute;
		top: -40px;
		left: 8px;
		width: 50px;
		height: 50px;
		background-size: contain;
		background-repeat: no-repeat;
      	background-image: url(https://jannesworld.nekoweb.org/assets/quest_marker.png);
      }
      
      .map-pin:hover::after { 
      	opacity: 1; 
      }
      .map-pin:hover { 
      	background: rgba(255, 215, 0, 0.4); 
      }

      /* Fog of War Styles */
      .map-pin.fogged {
          cursor: not-allowed;
          pointer-events: none;     
          background: rgba(100, 100, 0, 0.4); 
      }
      .map-pin.fogged::after {
          content: "???";           
          color: gray; border-color: gray;
      }

      /* Office Menu Popup */
      #officeMenu {
          position: absolute; 
          display: none;
          background: var(--dark-gray); 
          border: 2px solid var(--gray);
          padding: 15px; 
          border-radius: 8px; 
          z-index: 10;
          flex-direction: column; 
          gap: 8px;
      }
    </style>
  </head>
